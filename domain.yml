version: "3.1"

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - mood_great
  - mood_unhappy
  - thanks
  - bot_challenge
  - ask_seminar_event
  - ask_speech_event
  - ask_painting_event
  - ask_theatre_event
  - ask_athens_event
  - ask_thessaloniki_event
  - by_location
  - by_type
  - by_date







responses:
  utter_greet:
  - text: "Γειά σου! Πώς είσαι;"

  utter_introduction:
  - text: " Το όνομά μου είναι Μήτση, σκοπός μου είναι να παρέχω υποστήριξη προς το κοινό και να προσφέρω ενημέρωση σχετικά με τις εκδηλώσεις που προάγουμε."

  utter_happy:
  - text: "Εξαιρετικά, χαίρομαι!"

  utter_goodbye:
  - text: "Αντίο"

  utter_you_are_welcome:
  - text: "Παρακαλώ!"

  utter_iamabot:
  - text: "Είμαι ένα bot το οποίο λειτουργεί με την τεχνολογία Rasa. Είμαι σχεδιασμένη απο φοιτητές!"

  utter_can_i_help:
  - text: "Πώς μπορω να σας βοηθήσω;"
  - text: "Πώς μπορω να σας εξυπηρετήσω;"
  - text: "Είμαι εδώ για να σε βοηθήσω! Τι ψάχνεις;"

  utter_button_categories:
  - text: "Παρακαλώ επέλεξε εκδήλωση με βάση τις κατηγορίες"
    buttons:
    - title: "Τοποθεσία"
      payload: /by_location
    - title: "Tύπος"
      payload: /by_type
    - title: "Ημερομηνία"
      payload: /by_date
 
  utter_button_locationEvents:
  - text: "Επέλεξε την επιθεμητή τοποθεσία"
    buttons:
    - title: "Αθήνα"
      payload: /ask_athens_event
    - title: "Θεσσαλονίκη"
      payload: /ask_thessaloniki_event

  utter_button_typeEvents:
  - text: "Επέλεξε τον τύπο εκδήλωσεις που σε ενδιαφέρει"
    buttons:
    - title: "Σεμινάριο"
      payload: /ask_seminar_event
    - title: "Ομιλία"
      payload: /ask_speech_event
    - title: "Ζωγραφική"
      payload: /ask_painting_event
    - title: "Θέατρο"
      payload: /ask_theatre_event

actions:
 - select_all_events
 - select_seminar_events
 - select_speech_events
 - select_theatre_events
 - select_painting_events
 - select_athens_events
 - select_thessaloniki_events

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true

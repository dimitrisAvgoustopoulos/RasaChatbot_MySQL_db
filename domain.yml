version: "3.1"

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - mood_great
  - mood_unhappy
  - thanks
  - bot_challenge
  - ask_all_events
  - ask_seminar_event
  - ask speech_event
  - ask_painting_event
  - ask_athens_event
  - ask_thessaloniki_event
  - by_location
  - by_type
  - by_date







responses:
  utter_greet:
  - text: "Hey! How are you?"

  utter_introduction:
  - text: " My name is Mitsi, i am here to support people and informate them about the events we provide."

  utter_happy:
  - text: "Great,i am glad!"

  utter_goodbye:
  - text: "Bye"

  utter_you_are_welcome:
  - text: "You are welcome!"

  utter_iamabot:
  - text: "I am a bot, powered by Rasa."

  utter_can_i_help:
  - text: "How can i help you?"
  - text: "I am here to help you! What are you looking for?"

  utter_button_categories:
  - text: "Please select events by category "
    buttons:
    - title: "Location"
      payload: /by_location
    - title: "Type"
      payload: /by_type
    - title: "Date"
      payload: /by_date
 
  utter_button_locationEvents:
  - text: "Select your desired location"
    buttons:
    - title: "Athens"
      payload: /ask_athens_event
    - title: "Thessaloniki"
      payload: /ask_athens_event

  utter_button_typeEvents:
  - text: "Select the type of events you are interested"
    buttons:
    - title: "Seminar"
      payload: /ask_seminar_event
    - title: "Speech"
      payload: /ask_speach_event
    - title: "Paintings"
      payload: /ask_painting_event


actions:
 - select_all_events
 - select_seminar_events
 - select_speech_events
 - select_theatre_events
 - select_painting_events
 - select_athens_events
 - select_thessaloniki_events

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
